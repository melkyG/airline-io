<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Airline.io</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="banner">
        <div class="banner-left">
          <div class="banner-title">Airline.io</div>
          <div class="banner-version">V1.0</div>
        </div>
        <div class="banner-center">Multiplayer lobby prototype</div>
        <div class="banner-right">
          <div class="banner-label">Connection:</div>
          <div id="connectionStatus" class="status connected">Connecting...</div>
        </div>
      </header>

      <main class="main-content">
        <div class="username-wrapper">
          <label class="username-label" for="usernameInput">Username:</label>
          <input id="usernameInput" class="username-input" type="text" maxlength="25" autocomplete="off" spellcheck="false" placeholder="Enter a name" autofocus />
        </div>

        <section id="lobbyScreen" class="lobby-panel">
          <div class="lobby-meta-row">
            <span class="lobby-meta-label">Lobby</span>
            <div id="lobbyPreview" class="player-count">0/5 players</div>
          </div>
          <div class="section-divider"></div>
          <ul id="lobbyPlayerList" class="player-list"></ul>
          <div id="statusMessage" class="status-message" aria-live="polite"></div>
          <button id="joinButton" class="join-button">Join</button>
          <div class="footer-divider"></div>
          <div id="countdownArea" class="status-line" aria-live="polite">
            <span id="statusText" class="status-line-text">Waiting for players</span>
            <span id="statusDots" class="status-line-dots" aria-hidden="true"></span>
          </div>
        </section>

        <section id="gameScreen" class="game-card hidden">
          <h2>Map Placeholder</h2>
          <div id="gameStatus" class="game-status">Game has started.</div>
          <div id="gameTimer" class="game-status">00:00</div>
          <button id="devAddScoreButton" class="hud-dev-button" type="button">+500 Score</button>
          <div id="mapContainer" class="map-box"></div>

          <div class="game-panel">
            <h2>Leaderboard</h2>
            <ol id="leaderboard"></ol>
          </div>

          <div id="resultsOverlay" class="results-overlay hidden" aria-hidden="true">
            <div class="results-overlay-backdrop"></div>
            <div class="results-modal" role="dialog" aria-modal="true" aria-labelledby="resultsTitle">
              <h2 id="resultsTitle">Game Results</h2>
              <p id="resultsWinner" class="results-winner"></p>
              <p id="resultsEndReason" class="results-end-reason"></p>
              <div id="resultsStandingsHeader" class="results-standings-header">
                <span class="results-col-label">Players</span>
                <span class="results-col-label">Score</span>
              </div>
              <ol id="resultsStandings" class="results-standings"></ol>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="/state.js"></script>
    <script src="/map.js"></script>
    <script src="/render.js"></script>
    <script src="/game.js"></script>
  </body>
</html>
